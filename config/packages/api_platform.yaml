api_platform:
    title: Hello API Platform
    version: 1.0.0
    http_cache:
        invalidation:
            enabled: true
    exception_to_status:
        \Symfony\Component\Serializer\Exception\UnexpectedValueException: 400
        Doctrine\DBAL\Exception\UniqueConstraintViolationException: 409
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        json: ['application/json']
        jsonld: ['application/ld+json']

    docs_formats:
        json: ['application/json']
        html: ['text/html']
